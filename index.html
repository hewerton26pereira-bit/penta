<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pentatônica na Guitarra</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;padding:14px}
h1{text-align:center;font-size:20px;font-weight:600;margin-bottom:3px;color:#fff}
.subtitle{text-align:center;font-size:12px;color:#555;margin-bottom:14px}
.mode-toggle{display:flex;justify-content:center;margin-bottom:14px}
.mode-btn{padding:7px 24px;font-size:13px;font-weight:600;border:1px solid #444;background:#2a2a3e;color:#aaa;cursor:pointer;transition:all .2s}
.mode-btn:first-child{border-radius:8px 0 0 8px}
.mode-btn:last-child{border-radius:0 8px 8px 0}
.mode-btn.active-blues{background:#c0392b;color:#fff;border-color:#c0392b}
.mode-btn.active-penta{background:#5c4de8;color:#fff;border-color:#5c4de8}
.controls{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-bottom:12px;align-items:center}
.controls label{font-size:13px;color:#aaa}
select{font-size:13px;padding:5px 10px;border-radius:6px;border:1px solid #444;background:#2a2a3e;color:#eee;cursor:pointer}
.tabs{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tab{padding:6px 14px;font-size:13px;border-radius:6px;border:1px solid #444;background:#2a2a3e;color:#aaa;cursor:pointer;transition:all .15s}
.tab:hover{border-color:#888;color:#eee}
.tab.active-blues{background:#c0392b;color:#fff;border-color:#c0392b;font-weight:600}
.tab.active-penta{background:#5c4de8;color:#fff;border-color:#5c4de8;font-weight:600}
.tab.active-full{background:#16a085;color:#fff;border-color:#16a085;font-weight:600}
.canvas-wrap{display:flex;justify-content:center;margin-bottom:8px;overflow-x:auto}
canvas{display:block;border-radius:10px}
#cv{width:100%;max-width:680px}
#cv-full{width:100%;max-width:960px}
.info-bar{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.badge{font-size:12px;padding:3px 12px;border-radius:5px;font-weight:500}
.b-pos{background:#3a2800;color:#f39c12}
.b-info{background:#1a2a4a;color:#74b9ff}
.b-full{background:#0d3028;color:#1abc9c}
.legend{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;font-size:12px;color:#aaa;margin-bottom:10px}
.leg{display:flex;align-items:center;gap:5px}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.diam{width:10px;height:10px;background:#e74c3c;transform:rotate(45deg);border-radius:2px;flex-shrink:0}
.tip{max-width:680px;margin:0 auto 12px;padding:10px 16px;border-radius:8px;font-size:13px;color:#ccc;line-height:1.7;border-left:3px solid #5c4de8;background:#1e1e35}
.tip.blues-tip{border-left-color:#c0392b;background:#2a1818}
.tip.full-tip{border-left-color:#16a085;background:#0d2520}
.tip b{color:#fff}
.full-legend{max-width:960px;margin:0 auto 8px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.shape-badge{font-size:12px;padding:3px 12px;border-radius:5px;font-weight:500}
.licks-section{max-width:680px;margin:0 auto}
.licks-title{font-size:14px;font-weight:600;color:#e74c3c;margin-bottom:8px;padding-left:2px}
.lick-card{background:#1e1a10;border-left:3px solid #e67e22;border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:13px;color:#ccc;line-height:1.7}
.lick-card b{color:#fff}
.tab-line{font-family:'Courier New',monospace;font-size:12px;background:#111;border-radius:5px;padding:8px 10px;margin-top:6px;color:#f39c12;white-space:pre;overflow-x:auto}
footer{text-align:center;margin-top:20px;font-size:11px;color:#333}
</style>
</head>
<body>
<h1>🎸 Pentatônica na Guitarra</h1>
<p class="subtitle">Visão 3D do braço · 6ª corda perto de você · Blues & Pentatônica</p>

<div class="mode-toggle">
  <button class="mode-btn active-blues" id="btn-blues" onclick="setMode('blues')">🎵 Blues</button>
  <button class="mode-btn" id="btn-penta" onclick="setMode('penta')">🎸 Pentatônica</button>
</div>

<div class="controls">
  <label>Tom:</label>
  <select id="sel-root">
    <option value="0">E</option><option value="1">F</option>
    <option value="2">F#/Gb</option><option value="3">G</option>
    <option value="4">G#/Ab</option><option value="5" selected>A</option>
    <option value="6">A#/Bb</option><option value="7">B</option>
    <option value="8">C</option><option value="9">C#/Db</option>
    <option value="10">D</option><option value="11">D#/Eb</option>
  </select>
  <label id="type-label" style="display:none">Escala:</label>
  <select id="sel-type" style="display:none">
    <option value="minor">Menor</option>
    <option value="major">Maior</option>
  </select>
</div>

<div class="tabs" id="shapeTabs"></div>
<div class="info-bar" id="infoBar"></div>
<div class="canvas-wrap">
  <canvas id="cv"      width="680" height="280"></canvas>
  <canvas id="cv-full" width="960" height="280" style="display:none"></canvas>
</div>
<div class="full-legend" id="fullLegend" style="display:none"></div>
<div class="legend" id="legend"></div>
<div class="tip" id="tip"></div>
<div class="licks-section" id="licksSection"></div>
<footer>hewerton26pereira-bit · github.io/penta</footer>

<script>
var NAMES=['E','F','F#/Gb','G','G#/Ab','A','A#/Bb','B','C','C#/Db','D','D#/Eb'];
// OPEN por string: idx 0=6ª(grave/base), idx 5=1ª(aguda/topo)
var OPEN_STR=[0,5,10,3,7,0];

// Shapes: notes[si] onde si 0=6ª corda (base/perto) ... 5=1ª corda (topo/longe)
var BLUES_SHAPES=[
  {name:"Shape 1",off:0,
   tip:"Dedo <b>1</b> na 6ª corda (perto de você) = raiz menor. Bend clássico na 2ª corda. O shape mais usado no blues.",
   notes:[
    [{rf:0,f:1,root:true},{rf:3,f:4}],
    [{rf:0,f:1},{rf:3,f:4}],
    [{rf:0,f:1},{rf:2,f:3},{rf:3,f:4,blue:true}],
    [{rf:0,f:1},{rf:2,f:3}],
    [{rf:0,f:1,bend:'↑'},{rf:3,f:4}],
    [{rf:0,f:1,root:true},{rf:3,f:4}]
  ]},
  {name:"Shape 2",off:2,
   tip:"<b>+2 trastes</b> do shape 1. Raiz na 4ª corda com dedo 1. Blue note na 5ª corda.",
   notes:[
    [{rf:0,f:1},{rf:2,f:3}],
    [{rf:0,f:1},{rf:2,f:3},{rf:3,f:4,blue:true}],
    [{rf:0,f:1,root:true},{rf:3,f:4}],
    [{rf:0,f:1},{rf:3,f:4}],
    [{rf:0,f:1},{rf:2,f:3}],
    [{rf:0,f:1},{rf:2,f:3}]
  ]},
  {name:"Shape 3",off:5,
   tip:"<b>+5 trastes</b> do shape 1. Raiz na 3ª corda. Blue note na 3ª corda. Forma de 'C'.",
   notes:[
    [{rf:0,f:2},{rf:3,f:4}],
    [{rf:0,f:2},{rf:3,f:4}],
    [{rf:0,f:1},{rf:2,f:2,blue:true},{rf:3,f:4,root:true}],
    [{rf:0,f:1},{rf:2,f:3}],
    [{rf:0,f:1},{rf:3,f:4}],
    [{rf:0,f:2},{rf:3,f:4}]
  ]},
  {name:"Shape 4",off:7,
   tip:"<b>+7 trastes</b> do shape 1. Dedo <b>4</b> na 5ª corda = raiz. Blue note na 4ª corda.",
   notes:[
    [{rf:0,f:1},{rf:2,f:3}],
    [{rf:0,f:1,root:true},{rf:3,f:4}],
    [{rf:0,f:1},{rf:1,f:2,blue:true},{rf:3,f:4}],
    [{rf:0,f:1},{rf:2,f:3}],
    [{rf:0,f:1},{rf:3,f:4}],
    [{rf:0,f:1},{rf:2,f:3}]
  ]},
  {name:"Shape 5",off:9,
   tip:"<b>+9 trastes</b> — fecha o ciclo. Raiz com dedo <b>4</b> na 6ª corda. Depois, shape 1 recomeça uma oitava acima.",
   notes:[
    [{rf:0,f:4,root:true},{rf:2,f:1}],
    [{rf:0,f:4},{rf:2,f:1},{rf:3,f:2,blue:true}],
    [{rf:0,f:4},{rf:2,f:1}],
    [{rf:0,f:4},{rf:3,f:1}],
    [{rf:0,f:4},{rf:3,f:1}],
    [{rf:0,f:4,root:true},{rf:2,f:1}]
  ]}
];

var PENTA_SHAPES=[
  {name:"Shape 1",off:0,
   tip:"Dedo <b>1</b> na 6ª corda = raiz menor. Dedo <b>4</b> = relativa maior.",
   notes:[
    [{rf:0,f:1,root:true},{rf:3,f:4}],
    [{rf:0,f:1},{rf:3,f:4}],
    [{rf:0,f:1},{rf:2,f:3}],
    [{rf:0,f:1},{rf:2,f:3}],
    [{rf:0,f:1},{rf:3,f:4}],
    [{rf:0,f:1,root:true},{rf:3,f:4}]
  ]},
  {name:"Shape 2",off:2,
   tip:"<b>+2 trastes</b> do shape 1. Raiz na 4ª corda com dedo 1.",
   notes:[
    [{rf:0,f:1},{rf:2,f:3}],
    [{rf:0,f:1},{rf:2,f:3}],
    [{rf:0,f:1,root:true},{rf:3,f:4}],
    [{rf:0,f:1},{rf:3,f:4}],
    [{rf:0,f:1},{rf:2,f:3}],
    [{rf:0,f:1},{rf:2,f:3}]
  ]},
  {name:"Shape 3",off:5,
   tip:"<b>+5 trastes</b> do shape 1. Raiz na 2ª corda. Forma de 'C'.",
   notes:[
    [{rf:0,f:2},{rf:3,f:4}],
    [{rf:0,f:2},{rf:3,f:4}],
    [{rf:0,f:1},{rf:3,f:4}],
    [{rf:0,f:2},{rf:4,f:4}],
    [{rf:0,f:1,root:true},{rf:3,f:4}],
    [{rf:0,f:2},{rf:3,f:4}]
  ]},
  {name:"Shape 4",off:7,
   tip:"<b>+7 trastes</b> do shape 1. Dedo <b>4</b> na 5ª corda = raiz.",
   notes:[
    [{rf:0,f:1},{rf:2,f:3}],
    [{rf:0,f:1,root:true},{rf:3,f:4}],
    [{rf:0,f:1},{rf:2,f:3}],
    [{rf:0,f:1},{rf:2,f:3}],
    [{rf:0,f:1},{rf:3,f:4}],
    [{rf:0,f:1},{rf:2,f:3}]
  ]},
  {name:"Shape 5",off:9,
   tip:"<b>+9 trastes</b> — fecha o ciclo. Raiz com dedo <b>4</b> na 6ª corda.",
   notes:[
    [{rf:0,f:4,root:true},{rf:2,f:1}],
    [{rf:0,f:4},{rf:2,f:1}],
    [{rf:0,f:4},{rf:2,f:1}],
    [{rf:0,f:4},{rf:3,f:1}],
    [{rf:0,f:4},{rf:3,f:1}],
    [{rf:0,f:4,root:true},{rf:2,f:1}]
  ]}
];

var SHAPE_COLORS=['#e55039','#27ae60','#f39c12','#74b9ff','#e056fd'];
var FCOLORS={1:'#e55039',2:'#f39c12',3:'#f39c12',4:'#27ae60'};
var ROOT_COLOR='#5c4de8';
var BLUE_COLOR='#e74c3c';
var STR_THICK=[3.4,2.6,2.0,1.5,1.0,0.7]; // idx0=6ª(base) ... idx5=1ª(topo)
var STR_COLOR=['#907e3e','#a89858','#bcb070','#c8be82','#d4cb9a','#e0d8b8'];
var STR_LABELS=['6ª E','5ª A','4ª D','3ª G','2ª B','1ª e'];

var curMode='blues', curShape=0, curView='single';

// ─── PERSPECTIVA ───────────────────────────────────────────────
// si=0 → 6ª corda (base/baixo/perto), si=5 → 1ª corda (topo/longe)
// stringT: 0=base(6ª), 1=topo(1ª)
// fretT:   0=esquerda, 1=direita
function makePerspective(W, H, FSHOW){
  var pad = 72;
  // 6ª corda (base): grande e próxima → y alto, span vertical largo
  // 1ª corda (topo): pequena e distante → y baixo, span vertical estreito
  var BL={x:pad,   y:H-30};  // base esquerda  (6ª corda, cravelheira)
  var BR={x:W-20,  y:H-18};  // base direita   (6ª corda, corpo)
  var TL={x:pad,   y:42};    // topo esquerda  (1ª corda, cravelheira)
  var TR={x:W-20,  y:28};    // topo direita   (1ª corda, corpo)

  function lerp(a,b,t){return a+(b-a)*t;}

  function getPoint(fretT, stringT){
    // stringT: 0=6ª(base), 1=1ª(topo)
    var bx=lerp(BL.x,BR.x,fretT), by=lerp(BL.y,BR.y,fretT);
    var tx=lerp(TL.x,TR.x,fretT), ty=lerp(TL.y,TR.y,fretT);
    return {x:lerp(bx,tx,stringT), y:lerp(by,ty,stringT)};
  }
  return {getPoint:getPoint, BL:BL, BR:BR, TL:TL, TR:TR};
}

function drawNeck(ctx, W, H, FSHOW, baseFret, notes, minorRoot, shapeColors, isFullMode){
  ctx.clearRect(0,0,W,H);
  var P = makePerspective(W, H, FSHOW);
  var gp = P.getPoint;

  // ── corpo do braço ──
  ctx.beginPath();
  ctx.moveTo(P.TL.x,P.TL.y);
  ctx.lineTo(P.TR.x,P.TR.y);
  ctx.lineTo(P.BR.x,P.BR.y);
  ctx.lineTo(P.BL.x,P.BL.y);
  ctx.closePath();
  ctx.fillStyle='#1c0f05'; ctx.fill();

  // faixas de madeira alternadas
  for(var f=0;f<FSHOW;f++){
    var t0=f/FSHOW, t1=(f+1)/FSHOW;
    var p0=gp(t0,0),p1=gp(t1,0),p2=gp(t1,1),p3=gp(t0,1);
    ctx.beginPath();
    ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);
    ctx.lineTo(p2.x,p2.y);ctx.lineTo(p3.x,p3.y);
    ctx.closePath();
    ctx.fillStyle=f%2===0?'#1e1108':'#221409'; ctx.fill();
  }

  // ── trastes ──
  for(var f=0;f<=FSHOW;f++){
    var t=f/FSHOW;
    var top=gp(t,1), bot=gp(t,0);
    ctx.beginPath(); ctx.moveTo(top.x,top.y); ctx.lineTo(bot.x,bot.y);
    var lw = f===0 ? 3 : (0.8 + t*1.4);
    ctx.strokeStyle=f===0?'#bbb':'#3a2510';
    ctx.lineWidth=lw; ctx.stroke();

    // número do traste
    if(f<FSHOW){
      var tc=gp((f+0.5)/FSHOW,0);
      ctx.fillStyle='#3a2a10'; ctx.font='10px sans-serif'; ctx.textAlign='center';
      ctx.fillText(String(baseFret+f), tc.x, tc.y+14);
    }
  }

  // ── dots de inlay (centro vertical) ──
  var inlayFrets=[2,4]; // dentro do range visível, relativo
  inlayFrets.forEach(function(df){
    var t=(df+0.5)/FSHOW;
    var mid=gp(t,0.5);
    ctx.beginPath(); ctx.arc(mid.x, mid.y, 3.5, 0, 2*Math.PI);
    ctx.fillStyle='#2a1a0a'; ctx.fill();
  });

  // ── cordas ── (si=0=6ª=base=perto, si=5=1ª=topo=longe)
  for(var si=0;si<6;si++){
    var st=si/5; // 0=6ª(base), 1=1ª(topo)
    var left=gp(0,st), right=gp(1,st);
    var thickL=STR_THICK[si]*0.9, thickR=STR_THICK[si]*1.5;
    ctx.beginPath();
    ctx.moveTo(left.x,  left.y  - thickL*0.5);
    ctx.lineTo(right.x, right.y - thickR*0.5);
    ctx.lineTo(right.x, right.y + thickR*0.5);
    ctx.lineTo(left.x,  left.y  + thickL*0.5);
    ctx.closePath();
    ctx.fillStyle=STR_COLOR[si]; ctx.fill();

    // label
    ctx.fillStyle='#555'; ctx.font='10px sans-serif'; ctx.textAlign='right';
    ctx.fillText(STR_LABELS[si], left.x-6, left.y+4);
  }

  // ── notas ──
  // notes: array de {si, rf, f, root, blue, bend, shapeIdx}
  // si=0=6ª, si=5=1ª
  notes.forEach(function(n){
    var st=n.si/5;       // 0=6ª, 1=1ª
    var ft=(n.rf+0.5)/FSHOW;
    var p=gp(ft,st);
    var r=Math.round((6+ft*8)*(0.85+st*0.1));

    // sombra
    ctx.beginPath(); ctx.arc(p.x+1,p.y+2,r,0,2*Math.PI);
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fill();

    if(n.blue){
      var rd=r*0.82;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(Math.PI/4);
      ctx.fillStyle=BLUE_COLOR;
      ctx.fillRect(-rd,-rd,rd*2,rd*2);
      ctx.restore();
      ctx.fillStyle='#fff';
      var fs=Math.max(8,Math.round(r*0.75));
      ctx.font='bold '+fs+'px sans-serif'; ctx.textAlign='center';
      ctx.fillText('b5',p.x,p.y+fs*0.35);
    } else {
      var col;
      if(isFullMode) col=shapeColors[n.shapeIdx]||'#888';
      else col=n.root?ROOT_COLOR:FCOLORS[n.f];

      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,2*Math.PI);
      ctx.fillStyle=col; ctx.fill();

      if(n.root){
        ctx.beginPath(); ctx.arc(p.x,p.y,r+3,0,2*Math.PI);
        ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
      }
      var fs2=Math.max(8,Math.round(r*0.8));
      ctx.fillStyle='#fff';
      ctx.font='bold '+fs2+'px sans-serif'; ctx.textAlign='center';
      var label=isFullMode?String(n.shapeIdx+1):String(n.f);
      ctx.fillText(label,p.x,p.y+fs2*0.35);
    }

    if(n.bend){
      ctx.fillStyle='#e74c3c'; ctx.font='bold 11px sans-serif';
      ctx.textAlign='left';
      ctx.fillText(n.bend,p.x+r+3,p.y-4);
    }
  });

  // label perspectiva
  ctx.fillStyle='#2a2a2a'; ctx.font='10px sans-serif'; ctx.textAlign='left';
  ctx.fillText('perto de você ↙', P.BL.x+4, P.BL.y+18);
}

function getBaseFret(root,off){
  var f=(root-OPEN_STR[0]+12)%12;
  if(f===0)f=12;
  var bf=f+off;
  while(bf>17)bf-=12;
  if(bf<1)bf+=12;
  return bf;
}

function getMinorRoot(){
  var r=parseInt(document.getElementById('sel-root').value);
  if(curMode==='penta'&&document.getElementById('sel-type').value==='major')
    return(r+9)%12;
  return r;
}

function buildTabs(){
  var el=document.getElementById('shapeTabs'); el.innerHTML='';
  var shapes=curMode==='blues'?BLUES_SHAPES:PENTA_SHAPES;
  shapes.forEach(function(s,i){
    var b=document.createElement('button');
    b.textContent=s.name;
    b.className='tab'+(curView==='single'&&i===curShape?' active-'+curMode:'');
    b.onclick=(function(idx){return function(){curShape=idx;curView='single';buildTabs();draw();};})(i);
    el.appendChild(b);
  });
  var bf=document.createElement('button');
  bf.textContent='🗺 Braço completo';
  bf.className='tab'+(curView==='full'?' active-full':'');
  bf.onclick=function(){curView='full';buildTabs();draw();};
  el.appendChild(bf);
}

function setMode(m){
  curMode=m; curShape=0; curView='single';
  document.getElementById('btn-blues').className='mode-btn'+(m==='blues'?' active-blues':'');
  document.getElementById('btn-penta').className='mode-btn'+(m==='penta'?' active-penta':'');
  document.getElementById('sel-type').style.display=m==='penta'?'inline-block':'none';
  document.getElementById('type-label').style.display=m==='penta'?'inline-block':'none';
  buildTabs(); draw();
}

function draw(){
  if(curView==='full') drawFull(); else drawSingle();
}

function drawSingle(){
  document.getElementById('cv').style.display='block';
  document.getElementById('cv-full').style.display='none';
  document.getElementById('fullLegend').style.display='none';

  var minorRoot=getMinorRoot();
  var shapes=curMode==='blues'?BLUES_SHAPES:PENTA_SHAPES;
  var sh=shapes[curShape];
  var bf=getBaseFret(minorRoot,sh.off);
  var FSHOW=5;

  document.getElementById('infoBar').innerHTML=
    '<span class="badge b-pos">Traste base: '+bf+'º</span>'+
    '<span class="badge b-info">'+NAMES[minorRoot]+'m'+(curMode==='blues'?' blues':'')+'</span>';

  var tipEl=document.getElementById('tip');
  tipEl.innerHTML=sh.tip;
  tipEl.className='tip'+(curMode==='blues'?' blues-tip':'');

  var blueleg=curMode==='blues'?'<div class="leg"><div class="diam"></div>&nbsp;Blue note (b5)</div>':'';
  document.getElementById('legend').innerHTML=
    '<div class="leg"><div class="dot" style="background:#5c4de8;border:2px solid #fff"></div>Raiz</div>'+
    '<div class="leg"><div class="dot" style="background:#e55039"></div>Dedo 1</div>'+
    '<div class="leg"><div class="dot" style="background:#27ae60"></div>Dedo 4</div>'+
    '<div class="leg"><div class="dot" style="background:#f39c12"></div>Dedo 2/3</div>'+
    blueleg+(curMode==='blues'?'<div class="leg">↑ bend</div>':'');

  // montar lista de notas com si=string index (0=6ª)
  var noteList=[];
  sh.notes.forEach(function(strNotes,si){
    strNotes.forEach(function(n){
      if(n.rf>=0&&n.rf<FSHOW)
        noteList.push({si:si,rf:n.rf,f:n.f,root:n.root,blue:n.blue,bend:n.bend});
    });
  });

  var cv=document.getElementById('cv');
  drawNeck(cv.getContext('2d'),cv.width,cv.height,FSHOW,bf,noteList,minorRoot,null,false);
  renderLicks(minorRoot,bf);
}

function drawFull(){
  document.getElementById('cv').style.display='none';
  document.getElementById('cv-full').style.display='block';
  document.getElementById('licksSection').innerHTML='';

  var minorRoot=getMinorRoot();
  var shapes=curMode==='blues'?BLUES_SHAPES:PENTA_SHAPES;

  // calcular range total
  var allFrets=[];
  shapes.forEach(function(sh){
    var bf=getBaseFret(minorRoot,sh.off);
    sh.notes.forEach(function(row){row.forEach(function(n){allFrets.push(bf+n.rf);});});
  });
  var minF=Math.max(1,Math.min.apply(null,allFrets)-1);
  var maxF=Math.max.apply(null,allFrets)+1;
  var FSHOW=maxF-minF+1;

  document.getElementById('infoBar').innerHTML=
    '<span class="badge b-full">Braço completo — '+NAMES[minorRoot]+'m · trastes '+minF+' a '+maxF+'</span>';

  var tipEl=document.getElementById('tip');
  tipEl.innerHTML='Todos os 5 shapes no braço. Cores = cada shape. <b>Raiz</b> em roxo com anel. Use para improvisar sem parar — quando um shape termina o próximo começa.';
  tipEl.className='tip full-tip';

  var fl=document.getElementById('fullLegend');
  fl.style.display='flex';
  fl.innerHTML=['Shape 1','Shape 2','Shape 3','Shape 4','Shape 5'].map(function(n,i){
    return '<span class="shape-badge" style="background:'+SHAPE_COLORS[i]+'33;color:'+SHAPE_COLORS[i]+';border:1px solid '+SHAPE_COLORS[i]+'55">'+n+'</span>';
  }).join('')+'<span class="shape-badge" style="background:#5c4de835;color:#a29bfe;border:1px solid #5c4de855">● Raiz</span>'+
  (curMode==='blues'?'<span class="shape-badge" style="background:#e74c3c33;color:#e74c3c;border:1px solid #e74c3c55">◆ Blue note</span>':'');

  document.getElementById('legend').innerHTML='';

  var noteList=[];
  shapes.forEach(function(sh,si){
    var bf=getBaseFret(minorRoot,sh.off);
    sh.notes.forEach(function(strNotes,stri){
      strNotes.forEach(function(n){
        var fret=bf+n.rf;
        var rf=fret-minF;
        if(rf>=0&&rf<FSHOW)
          noteList.push({si:stri,rf:rf,f:n.f,root:n.root,blue:n.blue,shapeIdx:si});
      });
    });
  });

  var cv=document.getElementById('cv-full');
  drawNeck(cv.getContext('2d'),cv.width,cv.height,FSHOW,minF,noteList,minorRoot,SHAPE_COLORS,true);
}

function renderLicks(minorRoot,bf){
  var el=document.getElementById('licksSection');
  if(curMode!=='blues'){el.innerHTML='';return;}
  var rn=NAMES[minorRoot];
  var b=bf,b2=bf+2,b3=bf+3,b5=bf+5;
  el.innerHTML=
    '<div class="licks-title">🎵 Licks clássicos — '+rn+'m blues</div>'+
    '<div class="lick-card"><b>1. "Call" — bend na 2ª corda</b><br>Sobe ao '+b3+'º traste na 2ª corda, bend de 1 tom.<br>'+
    '<div class="tab-line">e |---'+b+'-------'+b3+'b↑---'+b+'---|\nB |---'+b+'---'+b3+'-------------------|\nG |---'+b+'---'+b2+'-------------------|\nD |--------------------------------|\nA |--------------------------------|\nE |--------------------------------|</div></div>'+
    '<div class="lick-card"><b>2. Blue note — o "sujo"</b><br>Na 4ª corda: '+b2+'º → blue note ('+b3+'º) → '+b5+'º. Tensão e resolução.<br>'+
    '<div class="tab-line">e |------------------------------|\nB |------------------------------|\nG |------------------------------|\nD |---'+b+'---'+b2+'---'+b3+'---'+b5+'---|\nA |---'+b+'---'+b3+'-------------------|\nE |---'+b+'--------------------------|</div></div>'+
    '<div class="lick-card"><b>3. Descida com bend — "response"</b><br>Desce 1ª e 2ª corda, termina com bend.<br>'+
    '<div class="tab-line">e |---'+b3+'---'+b+'-------------------|\nB |-------'+b3+'b↑---'+b+'---'+(b-1)+'---|\nG |------------------------------|\nD |------------------------------|\nA |------------------------------|\nE |------------------------------|</div></div>';
}

document.getElementById('sel-root').addEventListener('change',draw);
document.getElementById('sel-type').addEventListener('change',draw);
buildTabs();
draw();
</script>
</body>
</html>
